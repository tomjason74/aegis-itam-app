version: '3.8'

services:
  # 1. PostgreSQL (Relational Core DB)
  postgres:
    image: postgres:15-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aegispassword
      POSTGRES_DB: aegis_itam_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegis_itam_core"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. MongoDB (HIPAA Document Compliance Store)
  mongodb:
    image: mongo:6.0-jammy
    container_name: aegis-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: aegismongopassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # 3. InfluxDB (Time-Series Telemetry DB)
  influxdb:
    image: influxdb:2.7-alpine
    container_name: aegis-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=aegisinfluxpassword
      - DOCKER_INFLUXDB_INIT_ORG=AegisHealth
      - DOCKER_INFLUXDB_INIT_BUCKET=device_telemetry
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # 4. Zookeeper (Kafka Coordination)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: aegis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 5. Apache Kafka Broker (Event Backbone)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: aegis-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
  mongodb_data:
  influxdb_data:
  kafka_data:
